name: PR Preview (SWA)

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/**"
      - ".github/workflows/pr-preview.yml"

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  deploy-preview:
    name: Deploy / update PR preview
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - name: Check SWA token configured
        id: guard
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::AZURE_STATIC_WEB_APPS_API_TOKEN not set — skipping PR preview (expected until infra is deployed)."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Setup Node 22
        if: steps.guard.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: steps.guard.outputs.configured == 'true'
        run: npm ci

      - name: Build SPA
        if: steps.guard.outputs.configured == 'true'
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: npm run build --workspace apps/web

      - name: Deploy preview environment
        if: steps.guard.outputs.configured == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: upload
          app_location: apps/web/dist
          skip_app_build: true
          deployment_environment: pr-${{ github.event.pull_request.number }}

  close-preview:
    name: Tear down PR preview
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    env:
      SWA_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
    steps:
      - name: Check SWA token configured
        id: guard
        run: |
          if [ -z "$SWA_TOKEN" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Close preview environment
        if: steps.guard.outputs.configured == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ env.SWA_TOKEN }}
          action: close
          deployment_environment: pr-${{ github.event.pull_request.number }}
