name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-test:
    name: Lint / Typecheck / Build / Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  db-migrations:
    name: DB generate + migration drift check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: pokedeck_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/pokedeck_ci
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate drizzle migrations
        run: npm run db:generate --workspace apps/api

      - name: Verify no uncommitted migration drift
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::drizzle-kit generated changes that are not committed."
            echo "Run 'npm run db:generate --workspace apps/api' locally and commit the result."
            git status --porcelain
            git diff
            exit 1
          fi
          echo "No migration drift detected."
