version: 2
updates:
  # Root npm workspace (covers apps/* and packages/* via workspaces)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # GitHub Actions used by the workflows
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch

  # Docker base image for the API
  - package-ecosystem: docker
    directory: "/apps/api"
    schedule:
      interval: weekly
      day: monday
    groups:
      docker-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
