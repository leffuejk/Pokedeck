# Local development Postgres. `docker compose up -d` then set
# DATABASE_URL=postgres://postgres:postgres@localhost:5432/pokedeck
services:
  postgres:
    image: postgres:16
    container_name: pokedeck-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokedeck
    ports:
      - '5432:5432'
    volumes:
      - pokedeck-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d pokedeck']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pokedeck-pgdata:
